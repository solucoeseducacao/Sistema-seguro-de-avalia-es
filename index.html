// ══════════════════════════════════════════
// API — com retry automático e erros claros
// ══════════════════════════════════════════
async function api(dados, tentativas=3) {
  const url = CFG.gasUrl;
  if (!url) throw new Error("URL do Apps Script não configurada. Vá em ⚙️ Config e cole a URL.");
  const isPublico = ["buscarProva","listarAlunos"].includes(dados.acao) && !dados.senha;
  let ultimoErro;
  for (let t = 0; t < tentativas; t++) {
    try {
      let resp;
      if (isPublico) {
        const params = new URLSearchParams(dados);
        resp = await fetch(url+"?"+params, {method:"GET", signal:AbortSignal.timeout(12000)});
      } else {
        resp = await fetch(url, {
          method:"POST",
          headers:{"Content-Type":"text/plain"},
          body:JSON.stringify(dados),
          signal:AbortSignal.timeout(15000)
        });
      }
      if (!resp.ok) throw new Error(`Servidor retornou HTTP ${resp.status}`);
      return await resp.json();
    } catch(e) {
      ultimoErro = e;
      if (t < tentativas-1) await new Promise(r=>setTimeout(r,1200*(t+1)));
    }
  }
  // Traduz erros técnicos para mensagens amigáveis
  const msg = ultimoErro?.message||"";
  if (msg.includes("Failed to fetch") || msg.includes("NetworkError") || msg.includes("Load failed"))
    throw new Error("Sem conexão com o servidor. Verifique sua internet e tente novamente.");
  if (msg.includes("timeout") || msg.includes("AbortError"))
    throw new Error("O servidor demorou demais para responder. Tente novamente.");
  if (msg.includes("HTTP 4"))
    throw new Error("Erro na URL do Apps Script. Verifique a configuração.");
  throw new Error(ultimoErro?.message || "Erro desconhecido.");
}

// ══════════════════════════════════════════
// BACKUP LOCAL — salva progresso do aluno
// ══════════════════════════════════════════
const BKP = {
  chave(provaId, matricula){ return `iff_bkp_${provaId}_${matricula}`; },
  salvar(provaId, matricula, dados){ try{sessionStorage.setItem(BKP.chave(provaId,matricula),JSON.stringify({...dados,ts:Date.now()}))}catch{} },
  ler(provaId, matricula){ try{const d=sessionStorage.getItem(BKP.chave(provaId,matricula));return d?JSON.parse(d):null}catch{return null} },
  limpar(provaId, matricula){ try{sessionStorage.removeItem(BKP.chave(provaId,matricula))}catch{} },
  // Fila de resultados pendentes (falha de rede)
  salvarPendente(res){ try{const k="iff_pendentes";const a=JSON.parse(localStorage.getItem(k)||"[]");a.push({...res,_ts:Date.now()});localStorage.setItem(k,JSON.stringify(a))}catch{} },
  pendentes(){ try{return JSON.parse(localStorage.getItem("iff_pendentes")||"[]")}catch{return[]} },
  limparPendentes(){ localStorage.removeItem("iff_pendentes"); }
};

// Tenta reenviar resultados pendentes ao reconectar
async function reenviarPendentes() {
  const lista = BKP.pendentes();
  if (!lista.length || !CFG.gasUrl) return;
  let ok = 0;
  for (const res of lista) {
    try {
      const r = await api({acao:"salvarResultado", resultado:res, token:res._token}, 1);
      if (r.ok) ok++;
    } catch{}
  }
  if (ok > 0) {
    BKP.limparPendentes();
    console.log(`[SSA] ${ok} resultado(s) pendente(s) reenviado(s).`);
  }
}
window.addEventListener("online", reenviarPendentes);

// ══════════════════════════════════════════
// PARSERS
// ══════════════════════════════════════════
function parseQ(txt) {
  const qs = [];
  const blocos = txt.split(/\n(?=\d+[\.\)])/);
  for (const b of blocos) {
    const ls = b.trim().split("\n").map(l=>l.trim()).filter(Boolean);
    if (!ls.length) continue;
    const enunc = ls[0].replace(/^\d+[\.\)]\s*/,"").trim();
    if (!enunc) continue;
    const alts = []; let correta = -1;
    for (let i=1;i<ls.length;i++) {
      const gab = ls[i].match(/^[Gg]abarito\s*[:=]\s*([A-Ea-e])/);
      if (gab){correta=gab[1].toUpperCase().charCodeAt(0)-65;continue;}
      const alt = ls[i].match(/^([A-Ea-e])[\.\)]\s*(.+)/);
      if (alt) alts.push(alt[2].trim());
    }
    if (enunc && alts.length>=2) qs.push({id:qs.length+1,enunciado:enunc,alternativas:alts,correta});
  }
  return qs;
}

function parseAlunos(txt) {
  const alunos = [];
  const linhas = txt.split("\n").map(l=>l.trim()).filter(Boolean);
  for (const l of linhas) {
    const m = l.match(/^(\d{10,13})\s+(.+?)(?:\s+Cursando|\s+Trancado|\s+Formado)?$/i);
    if (m){alunos.push({matricula:m[1].trim(),nome:m[2].trim()});continue;}
    const m2 = l.match(/^(\d{8,13})\s+(.+)$/);
    if (m2){alunos.push({matricula:m2[1].trim(),nome:m2[2].trim()});continue;}
    if (l.length>5 && !/^\d+$/.test(l)) alunos.push({matricula:"",nome:l});
  }
  return alunos;
}

// ══════════════════════════════════════════
// UTILITÁRIOS
// ══════════════════════════════════════════
function shuffle(arr,seed){
  const a=[...arr];let s=seed||42;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
function calcNota(res,qs,pen){
  let ac=0;
  for(const q of qs){const r=res[q.id];if(r===undefined)continue;if(q.altMap[r]===q.correta)ac++;}
  const b=(ac/qs.length)*10;
  return{ac,tot:qs.length,bruta:b.toFixed(1),final:Math.max(0,b-pen).toFixed(1)};
}
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

        <button class="tab${S.abaProf==="nova"?" active":""}" onclick="setAba('nova')">➕ Nova</button>

  if(S.abaProf==="provas")renderProvas(body);
  else if(S.abaProf==="nova")renderNova(body);
  else if(S.abaProf==="turmas")renderTurmas(body);
  else if(S.abaProf==="config")renderConfig(body);
  else if(S.abaProf==="resultados"&&S.resultadosProva)renderResultados(body,S.resultadosProva);
  else if(S.abaProf==="analise"&&S.resultadosProva)renderAnalise(body,S.resultadosProva);

async function carregarProvas(){
  if(!CFG.gasUrl)return;
  set({loadingProvas:true});
  try{
    const r=await api({acao:"listarProvas",senha:PASS});
    if(r.ok){S.provas=r.provas||[];S.gasStatus="ok";}
    else S.gasStatus="erro";
  }catch(e){S.gasStatus="erro";console.warn(e);}
  set({loadingProvas:false});
}

async function encerrarProva(id){

function renderAnalise(el,p){
  const rs=p._resultados||[];
  if(!rs.length){el.innerHTML=`<div class="card" style="text-align:center;padding:48px;color:#94a3b8">Sem entregas para analisar.</div>`;return;}
  const temDetalhes=rs.some(r=>r.respostasOriginais);
  if(!temDetalhes){el.innerHTML=`<div class="card" style="padding:28px"><div style="font-weight:700;font-size:15px;color:#14532d;margin-bottom:10px">Análise de Questões</div><div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;font-size:13px;color:#78350f">Análise detalhada disponível nas próximas provas realizadas com esta versão.</div></div>`;return;}
  const stats={};
  for(const q of p.questoes)stats[q.id]={enunciado:q.enunciado,alternativas:q.alternativas,correta:q.correta,acertos:0,total:0,votos:new Array(q.alternativas.length).fill(0)};
  for(const r of rs){if(!r.respostasOriginais)continue;for(const[qid,altIdx]of Object.entries(r.respostasOriginais)){const s=stats[parseInt(qid)||qid];if(!s)continue;s.total++;if(typeof altIdx==="number"&&altIdx>=0){if(altIdx===s.correta)s.acertos++;if(altIdx<s.votos.length)s.votos[altIdx]++;}}}
  const lista=Object.values(stats).filter(s=>s.total>0).map(s=>({...s,percAcerto:Math.round((s.acertos/s.total)*100),percErro:Math.round(((s.total-s.acertos)/s.total)*100)})).sort((a,b)=>b.percErro-a.percErro);
  let html=`<div style="margin-bottom:16px"><div style="font-weight:700;font-size:16px;color:#14532d">Análise de Questões</div><div style="font-size:13px;color:#64748b">${escH(p.nome)} · ${rs.length} alunos</div></div><div style="display:flex;flex-direction:column;gap:12px">`;
  for(const q of lista){
    const qNum=p.questoes.findIndex(x=>x.id===q.id)+1;
    html+=`<div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase">Q${qNum}</span>
        <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;background:${q.percErro>=60?"#fee2e2":q.percErro>=30?"#fffbeb":"#dcfce7"};color:${q.percErro>=60?"#991b1b":q.percErro>=30?"#78350f":"#166534"}">${q.percErro}% erro</span>
        <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;background:#dcfce7;color:#166534">${q.percAcerto}% acerto</span>
      </div>
      <div style="font-size:14px;font-weight:600;margin-bottom:10px">${escH(q.enunciado)}</div>
      ${q.alternativas.map((a,ai)=>{const votos=q.votos[ai]||0;const pct=q.total>0?Math.round((votos/q.total)*100):0;const isC=ai===q.correta;
        return`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;background:${isC?"#dcfce7":"#f8fafc"};border:1px solid ${isC?"#86efac":"#e2e8f0"};margin-bottom:4px">
          <span style="font-weight:700;font-size:12px;color:${isC?"#166534":"#94a3b8"};width:18px">${String.fromCharCode(65+ai)})</span>
          <span style="font-size:13px;flex:1">${escH(a)}</span>
          <span style="font-size:11px;font-weight:700;color:${isC?"#166534":"#94a3b8"}">${votos}x (${pct}%)</span>
          ${isC?`<span style="font-size:10px;color:#166534;font-weight:700">✓</span>`:""}
        </div>`;}).join("")}
    </div>`;
  }
  html+="</div>";el.innerHTML=html;
}

async function onCodInput(v){
  const cod=v.trim().toUpperCase();
  const info=document.getElementById("al_prova_info");
  const wrap=document.getElementById("al_nome_wrap");
  const err=document.getElementById("al_err");
  const btn=document.getElementById("btn_iniciar");
  if(err)err.textContent="";
  provaCarregada=null;alunoSelecionado=null;
  if(wrap)wrap.style.display="none";
  if(btn)btn.disabled=true;
  if(cod.length<6){if(info)info.innerHTML="";return;}
  if(info)info.innerHTML=`<div style="font-size:13px;color:#64748b"><span class="spin"></span>Buscando prova…</div>`;
  try{
    const r=await api({acao:"buscarProva",codigo:cod},2);
    if(!r.ok){if(info)info.innerHTML=`<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:9px 12px;font-size:13px;color:#991b1b">${escH(r.erro||"Código não encontrado.")}</div>`;return;}
    provaCarregada=r.prova;
    const isQuiz=r.prova.tipo==="Quiz";
    if(info)info.innerHTML=`<div style="background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:10px 14px;font-size:13px;color:#14532d;line-height:1.8;margin-bottom:4px">
      <strong>${escH(r.prova.tipo)} · ${escH(r.prova.disciplina)}</strong>${r.prova.dataProva?` · ${escH(r.prova.dataProva)}`:""}${r.prova.descricao?` · ${escH(r.prova.descricao)}`:""}
      <br>${r.prova.questoes.length} questões · ⏱ ${r.prova.tempoMinutos} min${isQuiz?" · <strong>Quiz — cada questão vale 2,0 pts</strong>":""}
    </div>`;
    if(wrap)wrap.style.display="block";
    const chave=r.prova.disciplina+"|"+(r.prova.semestre||SEMESTRE);
    if(!alunosCache[chave]){
      const ra=await api({acao:"listarAlunos",disciplina:r.prova.disciplina,semestre:r.prova.semestre||SEMESTRE},2);
      alunosCache[chave]=ra.ok?(ra.alunos||[]):[];
    }
    renderListaAlunos(alunosCache[chave],"");
  }catch(e){if(info)info.innerHTML=`<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:9px 12px;font-size:13px;color:#991b1b">${escH(e.message)}</div>`;}
}

function renderListaAlunos(alunos,filtro){
  const lista=document.getElementById("al_lista");if(!lista)return;
  const f=filtro.toLowerCase();
  const filtrados=filtro?alunos.filter(a=>a.nome.toLowerCase().includes(f)):alunos;
  if(!filtrados.length){lista.innerHTML=`<div style="padding:12px;text-align:center;color:#94a3b8;font-size:13px">Nenhum aluno encontrado.</div>`;return;}
  lista.innerHTML=filtrados.map(a=>`
    <div onclick="selecionarAluno('${escH(a.matricula)}','${a.nome.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')"
      style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f1f5f9"
      onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='#fff'">
      ${a.matricula?`<span style="color:#94a3b8;font-size:11px;margin-right:8px">${escH(a.matricula)}</span>`:""}
      <span style="font-weight:500">${escH(a.nome)}</span>
    </div>`).join("");
}
function filtrarNomes(v){
  if(!provaCarregada)return;
  const chave=provaCarregada.disciplina+"|"+(provaCarregada.semestre||SEMESTRE);
  renderListaAlunos(alunosCache[chave]||[],v);
}
function selecionarAluno(mat,nome){
  alunoSelecionado={matricula:mat,nome};
  const sel=document.getElementById("al_selecionado");
  if(sel)sel.innerHTML=`<div style="background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:8px 12px;font-size:13px;color:#14532d;font-weight:600">✓ ${escH(nome)}${mat?` <span style="font-weight:400;color:#166534;font-size:11px">(${escH(mat)})</span>`:""}</div>`;
  const btn=document.getElementById("btn_iniciar");if(btn)btn.disabled=false;
  const lista=document.getElementById("al_lista");if(lista)lista.innerHTML="";
  const busca=document.getElementById("al_nome_busca");if(busca)busca.value=nome;
}

async function iniciarProva(){
  if(!provaCarregada||!alunoSelecionado)return;
  const err=document.getElementById("al_err");
  const btn=document.getElementById("btn_iniciar");
  if(btn)btn.disabled=true;if(err)err.textContent="";
  setLoad("Verificando sessão…");
  try{
    const rs=await api({acao:"iniciarSessao",provaId:provaCarregada.id,matricula:alunoSelecionado.matricula||alunoSelecionado.nome});
    if(!rs.ok){stopLoad();if(err)err.textContent=rs.erro||"Não foi possível iniciar.";if(btn)btn.disabled=false;return;}
    const token=rs.token;
    stopLoad();
    const p=provaCarregada;
    const seed=alunoSelecionado.nome.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    const qs=shuffle(p.questoes,seed).map((q,qi)=>{
      const idxs=shuffle(q.alternativas.map((_,i)=>i),seed+qi*1000);
      return{...q,alternativas:idxs.map(i=>q.alternativas[i]),altMap:idxs};
    });
    if(S._timer)clearInterval(S._timer);
    if(S._viol)window.removeEventListener("blur",S._viol);
    if(S._vis)document.removeEventListener("visibilitychange",S._vis);
    Object.assign(S,{
      rota:"aluno_prova",
      alunoNome:alunoSelecionado.nome,alunoMatricula:alunoSelecionado.matricula||"",
      alunoProva:p,alunoQs:qs,alunoRes:{},
      alunoViol:0,alunoPen:0,alunoSeg:p.tempoMinutos*60,
      alunoIdx:0,alunoAviso:null,alunoFim:null,alunoToken:token,
      _enc:false,_blurTs:null
    });
    // Verificar se há progresso salvo (falha anterior)
    const bkp=BKP.ler(p.id,alunoSelecionado.matricula||alunoSelecionado.nome);
    if(bkp&&bkp.alunoSeg>10){
      if(confirm(`Encontramos um progresso anterior salvo (${Object.keys(bkp.alunoRes||{}).length} respostas, ${fmt(bkp.alunoSeg)} restantes). Deseja continuar de onde parou?`)){
        S.alunoRes=bkp.alunoRes||{};
        S.alunoSeg=bkp.alunoSeg;
        S.alunoViol=bkp.alunoViol||0;
        S.alunoPen=bkp.alunoPen||0;
      }
    }
    render();iniciarTimer();iniciarDetector();
  }catch(e){stopLoad();if(err)err.textContent=e.message;if(btn)btn.disabled=false;}
}

      </div>

function responder(qid,ai){
  S.alunoRes={...S.alunoRes,[qid]:ai};
  // Salvar progresso automaticamente a cada resposta
  if(S.alunoProva&&(S.alunoMatricula||S.alunoNome)){
    BKP.salvar(S.alunoProva.id,S.alunoMatricula||S.alunoNome,{alunoRes:S.alunoRes,alunoSeg:S.alunoSeg,alunoViol:S.alunoViol,alunoPen:S.alunoPen});
  }
  const app=document.getElementById("app");if(app)renderAlunoProva(app);
}
function navQ(i){S.alunoIdx=i;const app=document.getElementById("app");if(app)renderAlunoProva(app);}
function confirmarEntrega(){
  if(confirm("Confirma a entrega da prova? Esta ação não pode ser desfeita."))encerrarAluno("Entrega voluntária");
}

function iniciarTimer(){
  if(S._timer)clearInterval(S._timer);
  S._timer=setInterval(()=>{
    S.alunoSeg--;
    // Salvar tempo restante no backup a cada 15s
    if(S.alunoSeg%15===0&&S.alunoProva){
      BKP.salvar(S.alunoProva.id,S.alunoMatricula||S.alunoNome,{alunoRes:S.alunoRes,alunoSeg:S.alunoSeg,alunoViol:S.alunoViol,alunoPen:S.alunoPen});
    }
    if(S.alunoSeg<=0){clearInterval(S._timer);encerrarAluno("Tempo esgotado");return;}
    const el=document.getElementById("al_timer");
    if(el){const isQ=S.alunoProva?.tipo==="Quiz";const al=S.alunoSeg<(isQ?90:300);el.textContent=fmt(S.alunoSeg);el.style.color=al?"#dc2626":"#166534";el.style.background=al?"#fee2e2":"#dcfce7";}
  },1000);
}

function iniciarDetector(){
  // Com tolerância: só conta violação se saída durar mais de BLUR_TOLERANCIA_MS
  const h=()=>{
    if(S._enc)return;
    S._blurTs=Date.now();
    setTimeout(()=>{
      if(S._enc||!S._blurTs)return;
      // Só conta se ainda estiver fora da janela
      if(Date.now()-S._blurTs>=BLUR_TOLERANCIA_MS-100){
        S._blurTs=null;
        S.alunoViol++;
        if(S.alunoViol===1){
          S.alunoPen=S.alunoProva.penalidade1;
          S.alunoAviso=`⚠️ Violação detectada! -${S.alunoProva.penalidade1}% na nota. Próxima saída encerra a prova.`;
          const av=document.getElementById("al_aviso");if(av){av.style.display="block";av.textContent=S.alunoAviso;}
          setTimeout(()=>{S.alunoAviso=null;const av=document.getElementById("al_aviso");if(av)av.style.display="none";},7000);
        }else{encerrarAluno("2ª violação — saída de tela");}
      }
    },BLUR_TOLERANCIA_MS);
  };
  const focus=()=>{S._blurTs=null;}; // Voltou rápido — cancela
  const vis=()=>{if(document.hidden)h();else S._blurTs=null;};
  S._viol=h;S._vis=vis;
  window.addEventListener("blur",h);
  window.addEventListener("focus",focus);
  document.addEventListener("visibilitychange",vis);
}

async function encerrarAluno(motivo){
  if(S._enc)return;S._enc=true;
  if(S._timer)clearInterval(S._timer);
  if(S._viol)window.removeEventListener("blur",S._viol);
  if(S._vis)document.removeEventListener("visibilitychange",S._vis);
  const r=calcNota(S.alunoRes,S.alunoQs,S.alunoPen);
  const respostasOriginais={};
  for(const q of S.alunoQs){const escolhido=S.alunoRes[q.id];if(escolhido!==undefined)respostasOriginais[q.id]=q.altMap[escolhido];}
  const resultado={
    nome:S.alunoNome,matricula:S.alunoMatricula,
    provaId:S.alunoProva.id,provaNome:S.alunoProva.nome,
    disciplina:S.alunoProva.disciplina,tipo:S.alunoProva.tipo,
    dataProva:S.alunoProva.dataProva,semestre:S.alunoProva.semestre||SEMESTRE,
    data:new Date().toLocaleString("pt-BR"),
    acertos:r.ac,total:r.tot,notaBruta:r.bruta,
    penalidade:S.alunoPen,notaFinal:r.final,
    violacoes:S.alunoViol,motivo,respostasOriginais,
    _token:S.alunoToken
  };
  // Limpar backup — prova entregue
  BKP.limpar(S.alunoProva.id,S.alunoMatricula||S.alunoNome);
  set({rota:"aluno_fim",alunoFim:resultado});
  // Enviar ao Sheets — com fallback local se falhar
  try{
    const res=await api({acao:"salvarResultado",resultado,token:S.alunoToken});
    if(!res.ok)throw new Error(res.erro||"Falha no servidor");
  }catch(e){
    // Guarda localmente para reenvio posterior
    BKP.salvarPendente({...resultado,_token:S.alunoToken});
    console.warn("[SSA] Resultado salvo localmente. Será reenviado quando houver conexão.");
  }
}

// ══════════════════════════════════════════
// ALUNO — FIM
// ══════════════════════════════════════════
function renderAlunoFim(el){
  const r=S.alunoFim;
  const ap=parseFloat(r.notaFinal)>=6;
  const isQuiz=r.tipo==="Quiz";
  el.innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#14532d,#15803d);padding:16px">
    <div class="card" style="max-width:440px;width:100%;text-align:center">
      <div style="width:64px;height:64px;border-radius:50%;background:#dcfce7;border:3px solid ${ap?"#22c55e":"#f59e0b"};display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px">${isQuiz?(ap?"🏆":"📝"):"✓"}</div>
      <div style="font-size:20px;font-weight:800;color:#1e293b;margin-bottom:4px">${isQuiz?"Quiz concluído!":"Prova entregue!"}</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:20px">${isQuiz?"Sua nota foi registrada.":"Resposta registrada. O professor divulgará as notas."}</div>
      <div style="background:#f8fafc;border-radius:10px;padding:14px 18px;text-align:left">
        ${[
          ["Aluno",r.nome,false,false],
          ["Matrícula",r.matricula||"—",false,false],
          ["Avaliação",r.tipo+" · "+r.disciplina,false,false],
          ["Acertos",r.acertos+"/"+r.total,false,false],
          isQuiz?["Nota (0–10)",r.notaFinal,false,true]:null,
          isQuiz?["Valor 3,0 pts",(parseFloat(r.notaFinal)*0.3).toFixed(2)+" / 3,00",false,false]:null,
          isQuiz?["Valor 4,0 pts",(parseFloat(r.notaFinal)*0.4).toFixed(2)+" / 4,00",false,false]:null,
          r.penalidade>0?["Penalidade","-"+r.penalidade+"%",true,false]:null,
          !isQuiz?["Status","Entregue — aguarde o professor",false,false]:null
        ].filter(Boolean).map(([l,v,red,big])=>`
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e2e8f0;font-size:14px">
            <span style="color:#64748b">${l}</span>
            <strong style="color:${big?(ap?"#166534":"#991b1b"):red?"#991b1b":"#1e293b"};font-size:${big?"18px":"14px"}">${escH(String(v))}</strong>
          </div>`).join("")}
      </div>
      ${!isQuiz?`<div style="margin-top:14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px;font-size:13px;color:#166534">As notas de ${escH(r.tipo)} serão divulgadas pelo professor.</div>`:""}
      <div style="font-size:12px;color:#94a3b8;margin-top:14px">Entregue em ${escH(r.data)}.<br>Devolva o celular/tablet ao professor.</div>
    </div>
  </div>`;
}

// Verificar pendentes ao carregar
reenviarPendentes();
render();
</script>
